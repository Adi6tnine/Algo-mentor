<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Core Brand Gradient -->
    <linearGradient id="primaryGrad" x1="120" y1="100" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#312E81" />
    </linearGradient>
    
    <!-- Accent Highlight -->
    <linearGradient id="accentGrad" x1="200" y1="200" x2="350" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    
    <!-- Pupil/Inner Lens Gradient -->
    <radialGradient id="eyeGrad" cx="256" cy="240" r="15" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ECFDF5" />
      <stop offset="70%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#064E3B" />
    </radialGradient>
  </defs>
  
  <!-- Main Isometric 'A' Structure -->
  <g filter="drop-shadow(0px 20px 30px rgba(79, 70, 229, 0.15))">
    <!-- Left Pillar (Folded Style) -->
    <path d="M256 80L100 400H180L256 210L332 400H412L256 80Z" fill="url(#primaryGrad)" />
    
    <!-- Right Pillar Shade (Creates 3D Depth) -->
    <path d="M256 80L332 400H412L256 80Z" fill="black" fill-opacity="0.15" />
    
    <!-- The "Algorithm" Bridge (Emerald Slice) -->
    <path d="M195 240L256 210L317 240L256 270L195 240Z" fill="url(#accentGrad)" />
    
    <!-- The "Eye" / Lens Feature -->
    <g transform="translate(256, 240)">
      <!-- Iris Background -->
      <circle r="18" fill="url(#eyeGrad)" stroke="white" stroke-width="2" />
      
      <!-- Pupil / Core -->
      <circle r="8" fill="#064E3B">
        <animate attributeName="r" values="7;9;7" dur="4s" repeatCount="indefinite" />
      </circle>
      
      <!-- Lens Highlight -->
      <circle cx="-5" cy="-5" r="3" fill="white" fill-opacity="0.8" />
    </g>
    
    <!-- Inner Cutout (The Bracket Negative Space) -->
    <path d="M256 140L195 290H317L256 140Z" fill="white" fill-opacity="0.05" />
  </g>
  
  <!-- Modern Technical Border (Hex-Grid Style) -->
  <path d="M256 20L470 138V374L256 492L42 374V138L256 20Z" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="10 10" />
</svg>
