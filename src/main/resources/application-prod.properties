# Production Configuration
spring.application.name=AlgoMentor

# PostgreSQL Database Configuration
# Database connection is configured programmatically in DatabaseConfig.java
# to handle Render's URL format conversion

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# H2 Console (DISABLED in production)
spring.h2.console.enabled=false

# Server Configuration
server.port=${PORT:8080}
server.address=0.0.0.0
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

# Connection Timeout
spring.mvc.async.request-timeout=60000

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:18000000}

# Rate Limiting
rate.limit.enabled=true
rate.limit.requests=${RATE_LIMIT_REQUESTS:100}
rate.limit.duration=${RATE_LIMIT_DURATION:60000}

# CORS Configuration
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:https://yourdomain.com}

# Logging
logging.level.root=INFO
logging.level.com.algomentor=INFO
logging.file.name=logs/algomentor.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.defaults.enabled=true
management.metrics.export.prometheus.enabled=true

# Security Headers
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
