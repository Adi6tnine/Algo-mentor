# Production Configuration
spring.application.name=AlgoMentor

# PostgreSQL Database Configuration
# Database connection is configured programmatically in DatabaseConfig.java
# to handle Render's URL format conversion

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false

# H2 Console (DISABLED in production)
spring.h2.console.enabled=false

# Server Configuration
server.port=${PORT:8080}
server.address=0.0.0.0
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.shutdown=graceful

# Connection Timeout
spring.mvc.async.request-timeout=60000

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:18000000}

# Rate Limiting
rate.limit.enabled=true
rate.limit.requests=${RATE_LIMIT_REQUESTS:100}
rate.limit.duration=${RATE_LIMIT_DURATION:60000}

# CORS Configuration
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:https://yourdomain.com}

# Logging
logging.level.root=INFO
logging.level.com.algomentor=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.defaults.enabled=true
management.metrics.export.prometheus.enabled=false

# Security Headers
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
