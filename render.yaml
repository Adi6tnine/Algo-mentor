databases:
  - name: algomentor-db
    plan: free

services:
  - type: web
    name: algomentor-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.render
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: algomentor-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: algomentor-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: algomentor-db
          property: password
      - key: JWT_SECRET
        value: "YWxnb21lbnRvcl9zdXBlcl9zZWNyZXRfa2V5X2Zvcl9qd3RfdG9rZW5fZ2VuZXJhdGlvbl8yMDI2"
      - key: JWT_EXPIRATION
        value: "18000000"
      - key: CORS_ALLOWED_ORIGINS
        value: https://algo-mentor.netlify.app
      - key: RATE_LIMIT_REQUESTS
        value: "100"
      - key: RATE_LIMIT_DURATION
        value: "60000"
